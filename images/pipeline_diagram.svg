  <rect x="365" y="105" width="180" height="125" class="box"/>
  <text x="410" y="145" class="icon">BQ</text>
  <text x="410" y="180" class="label">BigQuery</text>
  <text x="398" y="205" class="sub">Cloud data warehouse</text>

  <path d="M565 167 H650" class="arrow"/>

