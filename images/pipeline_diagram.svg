      .label { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #111827; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #475569; }
      .arrow { stroke: #4F8FC8; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .icon { font-family: Arial, Helvetica, sans-serif; font-size: 34px; fill: #2563EB; font-weight: 700; }
    </style>
  </defs>

  <text x="40" y="55" class="title">Data Pipeline</text>

